<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Senha | Aluga Fácil</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
  <div class="container header-content">
    <a class="brand brand-text" href="../index.html"><span class="brand-mark">🚗</span><strong>Aluga Fácil</strong></a>
  </div>
</header>

<main class="container section" style="max-width:460px; margin-top: 60px;">
  <div class="form-card">
    <h1 style="font-size:22px; margin-bottom:6px;">Criar nova senha</h1>
    <p class="small" style="margin-bottom:20px;">Digite sua nova senha abaixo.</p>

    <div id="msg-success" style="display:none; background:#dcfce7; color:#166534; padding:12px 14px; border-radius:8px; margin-bottom:16px; font-size:13px;"></div>
    <div id="msg-error"   style="display:none; background:#fee2e2; color:#b91c1c; padding:12px 14px; border-radius:8px; margin-bottom:16px; font-size:13px;"></div>

    <form id="reset-form">
      <div class="form-group">
        <label>Nova senha</label>
        <input type="password" id="new-password" placeholder="Mínimo 6 caracteres" required minlength="6">
      </div>
      <div class="form-group">
        <label>Confirmar nova senha</label>
        <input type="password" id="confirm-password" placeholder="Repita a senha" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; margin-top:8px;" id="btn-salvar">
        Salvar nova senha
      </button>
    </form>

    <p class="small" style="margin-top:18px; text-align:center;">
      <a href="login.html">← Voltar para o login</a>
    </p>
  </div>
</main>

<script>
const API_URL = "http://127.0.0.1:8000/api";

const params   = new URLSearchParams(window.location.search);
const token    = params.get("token");
const email    = params.get("email");

if (!token || !email) {
  document.querySelector(".form-card").innerHTML =
    '<p style="color:#b91c1c;">Link inválido ou expirado. <a href="recuperar-senha.html">Solicite um novo link</a>.</p>';
}

document.getElementById("reset-form").addEventListener("submit", async function (e) {
  e.preventDefault();

  const password        = document.getElementById("new-password").value;
  const confirmPassword = document.getElementById("confirm-password").value;
  const btn             = document.getElementById("btn-salvar");
  const msgOk           = document.getElementById("msg-success");
  const msgErr          = document.getElementById("msg-error");

  msgOk.style.display  = "none";
  msgErr.style.display = "none";

  if (password !== confirmPassword) {
    msgErr.textContent   = "As senhas não conferem.";
    msgErr.style.display = "block";
    return;
  }

  btn.disabled    = true;
  btn.textContent = "Salvando...";

  try {
    const response = await fetch(`${API_URL}/reset-password`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, token, password })
    });

    const result = await response.json();

    if (!response.ok) {
      msgErr.textContent   = result.message || "Erro ao redefinir senha.";
      msgErr.style.display = "block";
      return;
    }

    msgOk.textContent   = result.message + " Redirecionando para o login...";
    msgOk.style.display = "block";
    document.getElementById("reset-form").style.display = "none";

    setTimeout(() => { window.location.href = "login.html"; }, 2500);

  } catch (error) {
    msgErr.textContent   = "Erro na conexão com o servidor.";
    msgErr.style.display = "block";
  } finally {
    btn.disabled    = false;
    btn.textContent = "Salvar nova senha";
  }
});
</script>
</body>
</html>
