<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detalhes do veículo | Aluga Fácil</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/style.css" />

  <style>
    .gallery-main {
      background: #fff;
      border: 1px solid rgba(18,18,18,0.06);
      overflow: hidden;
      border-radius: 28px;
      min-height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gallery-main img {
      width: 100%;
      height: 100%;
      max-height: 420px;
      object-fit: contain;
      display: block;
      background: #fff;
    }

    .detail-loading {
      padding: 40px;
      background: #fff;
      border-radius: 20px;
      border: 1px solid rgba(18,18,18,0.06);
    }
  </style>
</head>

<body>
  <header class="header">
    <div class="container header-inner">
      <a class="brand" href="../index.html">
        <img src="../assets/img/logo-aluga-facil.jpg" alt="Aluga Fácil">
      </a>

      <nav class="nav">
        <a href="../index.html">Início</a>
        <a href="veiculos.html">Veículos</a>
        <a href="orcamento.html">Orçamento</a>
      </nav>

      <div class="header-actions">
        <a class="btn btn-primary" href="orcamento.html">Solicitar orçamento</a>
      </div>
    </div>
  </header>

  <main id="vehicle-detail">
    <section class="section">
      <div class="container">
        <div class="detail-loading">Carregando detalhes do veículo...</div>
      </div>
    </section>
  </main>

  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/vehicle-detail.js"></script>
</body>
</html>
