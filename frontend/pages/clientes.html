<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes | Aluga Fácil</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a class="brand" href="../index.html">
        <img src="../assets/img/logo-aluga-facil.jpg" alt="Aluga Fácil">
      </a>

      <nav class="sidebar-menu">
        <a class="sidebar-link" href="dashboard-admin.html">Dashboard</a>
        <a class="sidebar-link" href="gestao-veiculos.html">Veículos</a>
        <a class="sidebar-link" href="cadastro-veiculo.html">Cadastrar veículo</a>
        <a class="sidebar-link active" href="clientes.html">Clientes</a>
        <a class="sidebar-link" href="reservas.html">Reservas</a>
        <a class="sidebar-link" href="solicitacoes.html">Solicitações</a>
        <a class="sidebar-link" href="relatorios.html">Relatórios</a>
      </nav>

      <div class="sidebar-footer">
        <a class="btn btn-primary" href="../index.html">Visualizar site</a>
      </div>
    </aside>

    <main class="app-main">
      <div class="topbar">
        <div class="topbar-search">
          <span>⌕</span>
          <input type="text" placeholder="Buscar cliente">
        </div>

        <div class="actions-inline">
          <span class="badge">Administrador</span>
          <button class="btn btn-secondary" onclick="logout()">Sair</button>
        </div>
      </div>

      <section class="content-area">
        <section class="dashboard">
          <div class="dashboard-header">
            <div>
              <h1>Gestão de Clientes</h1>
              <p>Controle os clientes cadastrados na plataforma.</p>
            </div>
          </div>

          <div class="cards">
            <div class="card">
              <h3>Total</h3>
              <strong id="total">0</strong>
            </div>

            <div class="card">
              <h3>Ativos</h3>
              <strong id="ativos">0</strong>
            </div>

            <div class="card">
              <h3>Inativos</h3>
              <strong id="inativos">0</strong>
            </div>
          </div>

          <div class="table-box">
            <table>
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>CPF</th>
                  <th>Telefone</th>
                  <th>E-mail</th>
                  <th>CNH</th>
                  <th>Categoria</th>
                  <th>Status</th>
                </tr>
              </thead>

              <tbody id="tabelaClientes">
                <tr>
                  <td colspan="7">Carregando clientes...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script src="../assets/js/auth.js"></script>
  <script>
    protectPage("admin");
  </script>
  <script src="../assets/js/clientes.js"></script>
</body>
</html>
