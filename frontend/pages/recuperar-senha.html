<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Senha | Aluga Fácil</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
  <div class="container header-content">
    <a class="brand brand-text" href="../index.html"><span class="brand-mark">🚗</span><strong>Aluga Fácil</strong></a>
  </div>
</header>

<main class="container section" style="max-width:460px; margin-top: 60px;">
  <div class="form-card">
    <h1 style="font-size:22px; margin-bottom:6px;">Recuperar senha</h1>
    <p class="small" style="margin-bottom:20px;">Informe seu e-mail cadastrado e enviaremos um link para redefinir sua senha.</p>

    <div id="msg-success" style="display:none; background:#dcfce7; color:#166534; padding:12px 14px; border-radius:8px; margin-bottom:16px; font-size:13px;"></div>
    <div id="msg-error"   style="display:none; background:#fee2e2; color:#b91c1c; padding:12px 14px; border-radius:8px; margin-bottom:16px; font-size:13px;"></div>

    <form id="forgot-form">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="forgot-email" placeholder="seu@email.com" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; margin-top:8px;" id="btn-enviar">
        Enviar link de recuperação
      </button>
    </form>

    <p class="small" style="margin-top:18px; text-align:center;">
      <a href="login.html">← Voltar para o login</a>
    </p>
  </div>
</main>

<script>
const API_URL = "http://127.0.0.1:8000/api";

document.getElementById("forgot-form").addEventListener("submit", async function (e) {
  e.preventDefault();

  const email  = document.getElementById("forgot-email").value;
  const btn    = document.getElementById("btn-enviar");
  const msgOk  = document.getElementById("msg-success");
  const msgErr = document.getElementById("msg-error");

  msgOk.style.display  = "none";
  msgErr.style.display = "none";
  btn.disabled         = true;
  btn.textContent      = "Enviando...";

  try {
    const response = await fetch(`${API_URL}/forgot-password`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });

    const result = await response.json();

    msgOk.textContent    = result.message;
    msgOk.style.display  = "block";
    document.getElementById("forgot-form").reset();

  } catch (error) {
    msgErr.textContent   = "Erro na conexão com o servidor.";
    msgErr.style.display = "block";
  } finally {
    btn.disabled    = false;
    btn.textContent = "Enviar link de recuperação";
  }
});
</script>
</body>
</html>
