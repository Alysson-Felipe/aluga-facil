<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Veículo | Aluga Fácil</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/cadastro-veiculo.css">
</head>

<body>

  <div class="app-shell">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <a class="brand" href="../index.html">
        <img src="../assets/img/logo-aluga-facil.jpg" alt="Aluga Fácil">
      </a>

      <nav class="sidebar-menu">
        <a class="sidebar-link" href="dashboard-admin.html">Dashboard</a>

        <a class="sidebar-link active" href="cadastro-veiculo.html">
          Cadastrar veículo
        </a>

        <a class="sidebar-link" href="gestao-veiculos.html">
          Gestão de veículos
        </a>

        <a class="sidebar-link" href="clientes.html">
          Clientes
        </a>

        <a class="sidebar-link" href="reservas.html">
          Reservas
        </a>

        <a class="sidebar-link" href="solicitacoes.html">
          Solicitações
        </a>

        <a class="sidebar-link" href="relatorios.html">
          Relatórios
        </a>
      </nav>

      <div class="sidebar-footer">
        <a class="btn btn-primary" href="../index.html">
          Visualizar site
        </a>
      </div>
    </aside>

    <!-- CONTEÚDO -->
    <main class="app-main">

      <div class="topbar">
        <div class="topbar-search">
          <span>⌕</span>
          <input type="text" placeholder="Buscar">
        </div>

        <div class="actions-inline">
          <span class="badge">Administrador</span>

          <button class="btn btn-secondary" onclick="logout()">
            Sair
          </button>
        </div>
      </div>

      <section class="content-area">

        <section class="form-section">
          <h1>Cadastro de veículo</h1>

          <p>
            Preencha os dados abaixo para adicionar um novo veículo à plataforma.
          </p>

          <form id="vehicle-form">

            <div class="field">
              <label>Nome</label>
              <input id="name" type="text" required>
            </div>

            <div class="field">
              <label>Marca</label>
              <input id="brand" type="text" required>
            </div>

            <div class="field">
              <label>Modelo</label>
              <input id="model" type="text" required>
            </div>

            <div class="field">
              <label>Ano</label>
              <input id="year" type="number" required>
            </div>

            <div class="field">
              <label>Preço por dia</label>
              <input id="price_per_day" type="number" step="0.01" required>
            </div>

            <div class="field">
              <label>Imagem do veículo</label>
              <input id="image" type="file" accept="image/*">
            </div>

            <div class="field full">
              <img
                id="preview-image"
                style="max-width:220px; margin-top:10px; display:none; border-radius:12px;"
              >
            </div>

            <div class="field full">
              <label>Descrição</label>
              <textarea id="description"></textarea>
            </div>

            <button class="btn btn-primary" type="submit">
              Cadastrar veículo
            </button>

          </form>
        </section>

      </section>
    </main>
  </div>

  <script src="../assets/js/auth.js"></script>

  <script>
    protectPage("admin");
  </script>

  <script src="../assets/js/cadastro-veiculo.js"></script>

</body>
</html>
